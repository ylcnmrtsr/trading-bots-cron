name: Bot2 Watchdog
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Bot2 Watchdog
        run: |
          curl -s -X POST "https://superagent-4e0f1cc8.base44.app/functions/bot2Runner" \
            -H "Content-Type: application/json" \
            -d "{\"mode\":\"watchdog\"}" --max-time 30
