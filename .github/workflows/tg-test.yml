name: Telegram Test
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Telegram
        env:
          TELEGRAM_BOT_TOKEN_7: ${{ secrets.TELEGRAM_BOT_TOKEN_7 }}
        run: |
          pip install requests -q
          python3 - << 'EOF'
import requests, os
TOKEN = os.environ.get("TELEGRAM_BOT_TOKEN_7","")
CHAT_ID = "2055780815"
print(f"Token ilk 15: {TOKEN[:15]}")
r = requests.get(f"https://api.telegram.org/bot{TOKEN}/getMe", timeout=15)
print(f"getMe: {r.status_code} {r.text[:200]}")
r2 = requests.post(f"https://api.telegram.org/bot{TOKEN}/sendMessage", json={
    "chat_id": CHAT_ID,
    "text": "✅ Bot 3 XAU Scalper — Telegram Testi OK",
    "parse_mode": "Markdown"
}, timeout=15)
print(f"sendMessage: {r2.status_code} {r2.text[:300]}")
EOF
