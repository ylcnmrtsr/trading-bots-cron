name: Bot2 Weekly Review
on:
  schedule:
    - cron: "55 19 * * 0"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Weekly Review
        env:
          TELEGRAM_BOT_TOKEN_3: ${{ secrets.TELEGRAM_BOT_TOKEN_3 }}
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
        run: python scripts/bot2_runner.py weekly
