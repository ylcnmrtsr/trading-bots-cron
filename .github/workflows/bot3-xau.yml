name: Bot 3 — XAU Scalper

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Bot mode (both/scan/watch/test)'
        required: false
        default: 'both'

concurrency:
  group: bot3-xau
  cancel-in-progress: true

jobs:
  xau-scalper:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Run XAU Scalper Bot
        env:
          TELEGRAM_BOT_TOKEN_7: ${{ secrets.TELEGRAM_BOT_TOKEN_7 }}
          BASE44_SERVICE_TOKEN: ${{ secrets.BASE44_SERVICE_TOKEN }}
          BOT3_MODE: ${{ github.event.inputs.mode || 'both' }}
        run: python scripts/xau_scalper_bot.py
