name: Bot3 XAU Scalper
on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode: scan | watch | both | test"
        default: "both"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run Bot3 XAU Scalper
        timeout-minutes: 2
        env:
          TELEGRAM_BOT_TOKEN_3: ${{ secrets.TELEGRAM_BOT_TOKEN_3 }}
          TELEGRAM_BOT_TOKEN_7: ${{ secrets.TELEGRAM_BOT_TOKEN_7 }}
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
          BOT3_MODE: ${{ github.event.inputs.mode || 'both' }}
        run: python scripts/xau_scalper_bot.py
